<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoNoble Ramp - Redirect</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e1b4b 0%, #7c3aed 50%, #1e1b4b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }
        .logo {
            font-size: 3rem;
            margin-bottom: 2rem;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }
        .redirect-info {
            background: rgba(255, 255, 255, 0.1);
            padding: 1.5rem;
            border-radius: 1rem;
            margin: 2rem 0;
        }
        .url {
            background: rgba(124, 58, 237, 0.3);
            padding: 1rem;
            border-radius: 0.5rem;
            font-family: monospace;
            word-break: break-all;
            margin: 1rem 0;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .countdown {
            font-size: 3rem;
            font-weight: bold;
            margin: 1rem 0;
        }
        .button {
            display: inline-block;
            background: #7c3aed;
            color: white;
            padding: 1rem 2rem;
            border-radius: 0.5rem;
            text-decoration: none;
            font-weight: bold;
            margin-top: 1rem;
            transition: background 0.3s;
        }
        .button:hover {
            background: #6d28d9;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🚀</div>
        <h1>NeoNoble Ramp</h1>
        <p>Stai per essere reindirizzato alla piattaforma principale...</p>
        
        <div class="spinner"></div>
        <div class="countdown" id="countdown">3</div>
        
        <div class="redirect-info">
            <p><strong>Stai andando a:</strong></p>
            <div class="url">https://neno-swap-live.preview.emergentagent.com</div>
        </div>
        
        <p>Se il redirect non funziona, clicca qui:</p>
        <a href="https://neno-swap-live.preview.emergentagent.com" class="button">
            Vai alla Piattaforma
        </a>
    </div>
    
    <script>
        let seconds = 3;
        const countdownEl = document.getElementById('countdown');
        
        const countdown = setInterval(() => {
            seconds--;
            countdownEl.textContent = seconds;
            
            if (seconds <= 0) {
                clearInterval(countdown);
                window.location.href = 'https://neno-swap-live.preview.emergentagent.com';
            }
        }, 1000);
        
        // Immediate redirect after 3 seconds
        setTimeout(() => {
            window.location.href = 'https://neno-swap-live.preview.emergentagent.com';
        }, 3000);
    </script>
</body>
</html>
